<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <style>
    :root{--bg:#f3f6fb;--card:#fff;--accent:#0066cc}
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;background:var(--bg);display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:var(--card);padding:28px;border-radius:10px;box-shadow:0 6px 24px rgba(20,30,60,.08);width:360px}
    h1{margin:0 0 12px;font-size:20px;color:#0b2340}
    .desc{margin:0 0 18px;color:#4b5b73;font-size:13px}
    label{display:block;font-size:13px;margin-bottom:6px;color:#324044}
    input[type="text"],input[type="password"]{width:100%;padding:10px 12px;border:1px solid #d6e0ee;border-radius:6px;font-size:14px;box-sizing:border-box}
    .row{margin-bottom:12px}
    .actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    button{background:var(--accent);color:#fff;padding:10px 14px;border:none;border-radius:6px;cursor:pointer}
    .link{font-size:13px;color:var(--accent);text-decoration:none}
    .error{color:#b00020;font-size:13px;margin-top:8px;display:none}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Sign in</h1>
    <p class="desc">Enter your credentials to access the application.</p>
    <form id="loginForm" action="#" method="post" novalidate>
      <div class="row">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="row">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="actions">
        <a class="link" href="#">Forgot?</a>
        <button type="submit">Log in</button>
      </div>
      <div id="error" class="error">Please provide username and password.</div>
    </form>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value.trim();
      var err = document.getElementById('error');
      if(!u || !p){ err.style.display = 'block'; return; }
      err.style.display = 'none';
      // Replace below with real submit logic
      alert('Submitted: ' + u);
    });
  </script>
</body>
</html>
